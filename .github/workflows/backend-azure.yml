name: Deploy Backend to Azure App Service

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Verify dependencies
        run: |
          # Verify requirements.txt installs cleanly in CI.
          # IMPORTANT: the venv is intentionally NOT created inside backend/.
          # azure/webapps-deploy packages the entire backend/ directory, so any
          # antenv/ created here would be deployed to Azure with absolute symlinks
          # pointing to the GitHub runner's Python (e.g. /opt/hostedtoolcache/...),
          # which do not exist on Azure App Service. The broken venv causes
          # startup.sh to fail and uvicorn never starts — manifests as 502/503
          # with no CORS headers that the browser misreports as a CORS error.
          #
          # Azure Oryx runs during deployment (SCM_DO_BUILD_DURING_DEPLOYMENT=true
          # is the default for Python apps) and creates antenv/ with paths that are
          # correct for the Azure runtime. startup.sh then activates that venv.
          pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v2
        with:
          app-name: storyme-backend
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: backend
          # NOTE: startup-command is NOT valid with publish-profile auth.
          # Startup is declared via backend/Procfile which Azure reads automatically.
