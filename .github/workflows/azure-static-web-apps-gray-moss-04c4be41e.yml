name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main

jobs:
  build_and_deploy_job:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy Job

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3
        with:
          submodules: true
          lfs: false

      - name: Build And Deploy
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_GRAY_MOSS_04C4BE41E }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "./frontend"
          api_location: ""
          output_location: "build"
        env:
          REACT_APP_BACKEND_URL: "https://storyme-backend-d4bxg3afcdbreebt.centralindia-01.azurewebsites.net"
          # react-scripts@5 bundles ESLint 8 internally; having eslint@9 in
          # devDependencies causes a version conflict that aborts the build
          # under CI=true. DISABLE_ESLINT_PLUGIN skips the webpack ESLint
          # plugin entirely so the conflict never surfaces.
          DISABLE_ESLINT_PLUGIN: "true"
          # Suppress react-scripts preflight version-range checks (Node 22
          # exceeds the officially supported range for react-scripts@5).
          SKIP_PREFLIGHT_CHECK: "true"

  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Job

    steps:
      - name: Close Pull Request
        id: closepullrequest
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_GRAY_MOSS_04C4BE41E }}
          action: "close"
